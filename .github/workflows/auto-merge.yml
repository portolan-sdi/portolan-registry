name: Auto-merge after validation

on:
  workflow_run:
    workflows: ["Validate Catalogs"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            const prs = run.data.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            return null;
          result-encoding: string

      - name: Enable auto-merge
        if: steps.pr.outputs.result != 'null'
        run: |
          gh pr merge --auto --squash "$PR_NUMBER" \
            --repo "${{ github.repository }}"
        env:
          PR_NUMBER: ${{ steps.pr.outputs.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-publish:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for merge and trigger publish
        uses: actions/github-script@v9
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            const prs = run.data.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No PR found');
              return;
            }

            const prNumber = prs[0].number;

            // Poll until PR is merged (max 5 minutes)
            for (let i = 0; i < 30; i++) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              if (pr.data.merged) {
                console.log(`PR #${prNumber} merged, triggering publish`);
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'publish.yml',
                  ref: 'main'
                });
                return;
              }

              if (pr.data.state === 'closed') {
                console.log(`PR #${prNumber} closed without merge`);
                return;
              }

              console.log(`Waiting for PR #${prNumber} to merge... (${i + 1}/30)`);
              await new Promise(r => setTimeout(r, 10000));
            }

            console.log('Timeout waiting for merge');
