name: Scheduled Re-validation

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Re-validate all catalogs
        id: revalidate
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          uv run --with pyyaml --with requests --with email-validator python3 << 'PYTHON'
          import yaml
          import json
          import requests
          import os
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          from email_validator import validate_email, EmailNotValidError

          STALE_THRESHOLD_DAYS = 30

          def validate_maintainer_email(email, catalog_id):
              """Validate maintainer email - returns normalized email or None if invalid."""
              if not email:
                  return None

              # Full validation: syntax + MX record check
              try:
                  v = validate_email(email, check_deliverability=True)
                  return v.normalized
              except EmailNotValidError as e:
                  print(f"  Invalid maintainer email for {catalog_id}: {email} - {e}")
                  return None

          def fetch_json(url, timeout=30):
              """Fetch JSON from URL."""
              resp = requests.get(url, timeout=timeout)
              resp.raise_for_status()
              return resp.json()

          def resolve_url(base_url, href):
              """Resolve relative href against base URL."""
              if href.startswith('http'):
                  return href
              from urllib.parse import urljoin
              return urljoin(base_url, href)

          def crawl_catalog(catalog_url):
              """Crawl a STAC catalog and extract metadata."""
              print(f"Crawling: {catalog_url}")
              catalog = fetch_json(catalog_url)

              result = {
                  'url': catalog_url,
                  'title': catalog.get('title'),
                  'description': catalog.get('description'),
                  'stac_version': catalog.get('stac_version'),
                  'providers': catalog.get('providers'),
                  'keywords': catalog.get('keywords'),
                  'bbox': None,
                  'license': None,
                  'collection_count': 0,
                  'feature_count': 0,
                  'item_count': 0,
                  'asset_count': 0,
                  'total_size_bytes': 0,
                  'temporal_extent': None,
                  'api_type': None,
                  'last_crawled': datetime.now(timezone.utc).isoformat(),
                  'validation': {
                      'stac_valid': True,
                      'has_versions_json': False,
                      'has_portolan_dir': False,
                      'has_llms_txt': False
                  }
              }

              # Detect API type (probe /search endpoint)
              base = catalog_url.rsplit('/', 1)[0]
              try:
                  resp = requests.get(f"{base}/search", timeout=5)
                  result['api_type'] = 'api' if resp.status_code == 200 else 'static'
              except:
                  result['api_type'] = 'static'

              # Check for llms.txt link at catalog level
              for link in catalog.get('links', []):
                  if link.get('rel') == 'llms':
                      result['validation']['has_llms_txt'] = True
                      break

              # Find child catalogs/collections
              bboxes = []
              licenses = set()
              temporal_extents = []

              for link in catalog.get('links', []):
                  if link.get('rel') != 'child':
                      continue

                  child_url = resolve_url(catalog_url, link['href'])
                  try:
                      child = fetch_json(child_url)

                      if child.get('type') == 'Collection':
                          result['collection_count'] += 1

                          # Extract bbox
                          extent = child.get('extent', {})
                          spatial = extent.get('spatial', {})
                          bbox = spatial.get('bbox', [[]])[0]
                          if bbox and len(bbox) >= 4:
                              bboxes.append(bbox)

                          # Extract temporal extent
                          temporal = extent.get('temporal', {}).get('interval', [[]])[0]
                          if temporal and len(temporal) >= 2:
                              temporal_extents.append(temporal)

                          # Extract license
                          if child.get('license'):
                              licenses.add(child['license'])

                          # Extract feature count
                          if child.get('table:row_count'):
                              result['feature_count'] += child['table:row_count']

                          # Count assets and sizes
                          for asset_key, asset in child.get('assets', {}).items():
                              result['asset_count'] += 1
                              if isinstance(asset, dict) and 'file:size' in asset:
                                  result['total_size_bytes'] += asset['file:size']

                          # Check for versions.json
                          for clink in child.get('links', []):
                              if clink.get('rel') == 'version-history':
                                  result['validation']['has_versions_json'] = True

                      elif child.get('type') == 'Catalog':
                          # Recurse into sub-catalogs
                          sub = crawl_catalog(child_url)
                          result['collection_count'] += sub['collection_count']
                          result['feature_count'] += sub['feature_count']
                          result['item_count'] += sub['item_count']
                          result['asset_count'] += sub['asset_count']
                          result['total_size_bytes'] += sub['total_size_bytes']
                          if sub['bbox']:
                              bboxes.append(sub['bbox'])
                          if sub['license']:
                              licenses.add(sub['license'])
                          if sub['temporal_extent']:
                              temporal_extents.append(sub['temporal_extent'])
                          if sub['validation']['has_versions_json']:
                              result['validation']['has_versions_json'] = True
                          if sub['validation']['has_llms_txt']:
                              result['validation']['has_llms_txt'] = True

                  except Exception as e:
                      print(f"  Warning: Failed to fetch {child_url}: {e}")

              # Aggregate bbox (union of all bboxes)
              if bboxes:
                  result['bbox'] = [
                      min(b[0] for b in bboxes),
                      min(b[1] for b in bboxes),
                      max(b[2] for b in bboxes),
                      max(b[3] for b in bboxes),
                  ]

              # Aggregate temporal extent (union)
              if temporal_extents:
                  starts = [t[0] for t in temporal_extents if t[0]]
                  ends = [t[1] for t in temporal_extents if t[1]]
                  result['temporal_extent'] = [
                      min(starts) if starts else None,
                      max(ends) if ends else None
                  ]

              # Pick most common license (or first if tie)
              if licenses:
                  result['license'] = sorted(licenses)[0]

              # Check for .portolan directory
              try:
                  portolan_url = f"{base}/.portolan/config.yaml"
                  resp = requests.head(portolan_url, timeout=10)
                  result['validation']['has_portolan_dir'] = resp.status_code == 200
              except:
                  pass

              return result

          def update_status(catalog_id, validation_passed, current_state, failure_reason=None):
              """Update catalog status based on validation result."""
              now = datetime.now(timezone.utc).isoformat()
              status = current_state.get('status', 'valid')
              stale_since = current_state.get('stale_since')

              if validation_passed:
                  return {
                      'status': 'valid',
                      'last_validated': now,
                      'stale_since': None,
                      'failure_reason': None
                  }

              # Validation failed
              if status == 'valid':
                  # First failure: transition to stale
                  return {
                      'status': 'stale',
                      'last_validated': now,
                      'stale_since': now,
                      'failure_reason': failure_reason
                  }

              if status == 'stale':
                  # Check 30-day rule
                  stale_dt = datetime.fromisoformat(stale_since.replace('Z', '+00:00'))
                  if (datetime.now(timezone.utc) - stale_dt).days >= STALE_THRESHOLD_DAYS:
                      return {
                          'status': 'removed',
                          'last_validated': now,
                          'stale_since': stale_since,
                          'failure_reason': f'Stale for {STALE_THRESHOLD_DAYS}+ days'
                      }
                  # Still stale
                  return {
                      'status': 'stale',
                      'last_validated': now,
                      'stale_since': stale_since,
                      'failure_reason': failure_reason
                  }

              # Already removed - stays removed
              return {
                  'status': 'removed',
                  'last_validated': now,
                  'stale_since': current_state.get('stale_since'),
                  'failure_reason': current_state.get('failure_reason')
              }

          def send_stale_notification(catalog_id, catalog_data, failure_reason):
              """Send email notification when catalog becomes stale."""
              api_key = os.environ.get('RESEND_API_KEY')
              if not api_key:
                  print(f"  Skipping notification: RESEND_API_KEY not configured")
                  return

              # Extract maintainer email from providers
              maintainer_email = None
              providers = catalog_data.get('providers') or []
              for provider in providers:
                  if isinstance(provider, dict):
                      contact = provider.get('contact') or {}
                      if isinstance(contact, dict) and contact.get('email'):
                          maintainer_email = contact['email']
                          break

              if not maintainer_email:
                  print(f"  Skipping notification: No maintainer email found")
                  return

              # Validate email before sending
              maintainer_email = validate_maintainer_email(maintainer_email, catalog_id)
              if not maintainer_email:
                  print(f"  Skipping notification: Invalid maintainer email")
                  return

              title = catalog_data.get('title') or catalog_id
              url = catalog_data.get('url', 'unknown')

              try:
                  resp = requests.post(
                      'https://api.resend.com/emails',
                      headers={
                          'Authorization': f'Bearer {api_key}',
                          'Content-Type': 'application/json'
                      },
                      json={
                          'from': 'Portolan Registry <registry@portolan-sdi.org>',
                          'to': [maintainer_email],
                          'subject': f'[Portolan Registry] Catalog validation failed: {title}',
                          'html': f'''
                              <h2>Catalog Validation Failed</h2>
                              <p>Your STAC catalog <strong>{title}</strong> failed validation during our periodic re-check.</p>
                              <p><strong>Catalog URL:</strong> <a href="{url}">{url}</a></p>
                              <p><strong>Reason:</strong> {failure_reason}</p>
                              <p>If the catalog remains unreachable for 30 days, it will be marked as removed from the registry.</p>
                              <p>To resolve this issue, please ensure your catalog is accessible and re-submit if needed.</p>
                              <hr>
                              <p><small>This is an automated message from the <a href="https://portolan-sdi.org">Portolan Registry</a>.</small></p>
                          '''
                      },
                      timeout=30
                  )
                  if resp.status_code == 200:
                      print(f"  Notification sent to {maintainer_email}")
                  else:
                      print(f"  Failed to send notification: {resp.status_code} {resp.text}")
              except Exception as e:
                  print(f"  Error sending notification: {e}")

          # Load existing state from export
          export_file = Path('exports/catalogs.json')
          state = {}
          if export_file.exists():
              with open(export_file) as f:
                  existing = json.load(f)
              for cat in existing.get('catalogs', []):
                  state[cat['id']] = {
                      'status': cat.get('status', 'valid'),
                      'last_validated': cat.get('last_validated'),
                      'stale_since': cat.get('stale_since'),
                      'failure_reason': cat.get('failure_reason')
                  }

          # Track transitions for notifications
          newly_stale = []

          # Process all catalog entries
          catalog_files = sorted(Path('catalogs').glob('*.yaml'))
          crawled_data = {}

          for yaml_file in catalog_files:
              catalog_id = yaml_file.stem
              print(f"\n=== Re-validating {catalog_id} ===")

              with open(yaml_file) as f:
                  entry = yaml.safe_load(f)

              url = entry.get('url')
              if not url:
                  print(f"  Skipping: Missing URL")
                  continue

              current_state = state.get(catalog_id, {
                  'status': 'valid',
                  'last_validated': None,
                  'stale_since': None,
                  'failure_reason': None
              })

              # Skip removed catalogs (they stay removed until re-submitted)
              if current_state.get('status') == 'removed':
                  print(f"  Skipping: Already removed")
                  crawled_data[catalog_id] = None
                  continue

              previous_status = current_state.get('status', 'valid')

              try:
                  result = crawl_catalog(url)
                  result['id'] = catalog_id
                  crawled_data[catalog_id] = result
                  print(f"  OK: {result['title']} ({result['collection_count']} collections)")

                  # Update state: validation passed
                  state[catalog_id] = update_status(catalog_id, True, current_state)

              except Exception as e:
                  failure_reason = str(e)
                  print(f"  FAILED: {failure_reason}")

                  # Update state: validation failed
                  state[catalog_id] = update_status(catalog_id, False, current_state, failure_reason)
                  crawled_data[catalog_id] = None

                  # Track if newly stale for notification
                  if previous_status == 'valid' and state[catalog_id]['status'] == 'stale':
                      newly_stale.append((catalog_id, entry, failure_reason))

          # Send notifications for newly stale catalogs
          if newly_stale:
              print(f"\n=== Sending notifications for {len(newly_stale)} newly stale catalog(s) ===")
              for catalog_id, entry, failure_reason in newly_stale:
                  send_stale_notification(catalog_id, entry, failure_reason)

          print(f"\n=== State updated ===")

          # Generate export with status merged in
          catalogs = []
          for catalog_id, data in crawled_data.items():
              catalog_state = state.get(catalog_id, {})

              if data:
                  # Merge state into crawled data
                  data['status'] = catalog_state.get('status', 'valid')
                  data['last_validated'] = catalog_state.get('last_validated')
                  data['stale_since'] = catalog_state.get('stale_since')
                  data['failure_reason'] = catalog_state.get('failure_reason')
                  catalogs.append(data)
              else:
                  # For removed/failed catalogs, create minimal entry
                  yaml_file = Path('catalogs') / f'{catalog_id}.yaml'
                  with open(yaml_file) as f:
                      entry = yaml.safe_load(f)
                  catalogs.append({
                      'id': catalog_id,
                      'url': entry.get('url'),
                      'title': None,
                      'description': None,
                      'status': catalog_state.get('status', 'removed'),
                      'last_validated': catalog_state.get('last_validated'),
                      'stale_since': catalog_state.get('stale_since'),
                      'failure_reason': catalog_state.get('failure_reason'),
                      'last_crawled': None,
                      'collection_count': 0,
                      'feature_count': 0
                  })

          # Sort by id
          catalogs.sort(key=lambda c: c['id'])

          export = {
              'generated': datetime.now(timezone.utc).isoformat(),
              'count': len(catalogs),
              'catalogs': catalogs
          }

          Path('exports').mkdir(exist_ok=True)
          with open('exports/catalogs.json', 'w') as f:
              json.dump(export, f, indent=2)

          print(f"\n=== Generated exports/catalogs.json with {len(catalogs)} catalog(s) ===")

          # Summary
          valid_count = sum(1 for s in state.values() if s.get('status') == 'valid')
          stale_count = sum(1 for s in state.values() if s.get('status') == 'stale')
          removed_count = sum(1 for s in state.values() if s.get('status') == 'removed')
          print(f"\nStatus summary: {valid_count} valid, {stale_count} stale, {removed_count} removed")
          PYTHON

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add exports/catalogs.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update catalog validity states [skip ci]"
            git push
            echo "Pushed updated state and export"
          fi

      - name: Refresh portolan-sdi.org catalog cache
        if: success()
        continue-on-error: true
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $REVALIDATE_SECRET" \
            https://www.portolan-sdi.org/api/revalidate
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
